version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: bakong-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme123
      MONGO_INITDB_DATABASE: bakong-bot
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - bakong-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/bakong-bot --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Telegram Bot Application
  app:
    build: .
    container_name: bakong-bot
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_TYPE=mongodb
      - MONGODB_URI=mongodb://admin:changeme123@mongodb:27017/bakong-bot?authSource=admin
      - PORT=3000
      - HOST=0.0.0.0
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bakong-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  bakong-network:
    driver: bridge
